/* ====== auth + storage ====== */
const USERS_KEY = "nexus-users-v1";
const SESSION_KEY = "nexus-session-v1";
function hashPw(pw) { let h = 5381; const s = "nexus-salt-" + String(pw || ""); for (let i = 0; i < s.length; i++) h = ((h * 33) ^ s.charCodeAt(i)) >>> 0; return h.toString(36); }
function loadUsers() { try { return JSON.parse(localStorage.getItem(USERS_KEY) || "{}"); } catch (e) { return {}; } }
function saveUsers(u) { try { localStorage.setItem(USERS_KEY, JSON.stringify(u)); } catch (e) {} }
function loadSession() { try { return localStorage.getItem(SESSION_KEY) || null; } catch (e) { return null; } }
function saveSession(e) { try { if (e) localStorage.setItem(SESSION_KEY, e); else localStorage.removeItem(SESSION_KEY); } catch (er) {} }
function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(e || "")); }
function userStorageKey(email, kind) { const safe = String(email || "").toLowerCase().replace(/[^a-z0-9@._-]/g, "_"); return "nexus-" + kind + "-" + safe; }

function detectInitialLang() {
  try { const s = localStorage.getItem("nexus-lang"); if (s === "ar" || s === "en") return s; } catch (e) {}
  if (typeof navigator !== "undefined") {
    const langs = navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || "ar"];
    for (const l of langs) { if (!l) continue; if (l.toLowerCase().startsWith("ar")) return "ar"; if (l.toLowerCase().startsWith("en")) return "en"; }
  }
  return "ar";
}
function detectInitialTheme() {
  try { const s = localStorage.getItem("nexus-theme"); if (s === "light" || s === "dark") return s; } catch (e) {}
  if (typeof window !== "undefined" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) return "dark";
  return "light";
}

/* ====== UI atoms ====== */
function ripple(onClick) {
  return (e) => {
    const btn = e.currentTarget; const r = btn.getBoundingClientRect();
    const sz = Math.max(r.width, r.height);
    const c = document.createElement("span"); c.className = "ripple-circle";
    c.style.width = c.style.height = `${sz}px`;
    c.style.left = `${e.clientX - r.left - sz / 2}px`; c.style.top = `${e.clientY - r.top - sz / 2}px`;
    btn.appendChild(c); setTimeout(() => c.remove(), 600);
    if (onClick) onClick(e);
  };
}
function Btn({ children, onClick, variant = "solid", size = "md", icon: Icon, className = "", type = "button", disabled }) {
  const base = "ripple-btn inline-flex items-center justify-center gap-2 rounded-xl font-semibold transition active:scale-95 disabled:opacity-50 disabled:pointer-events-none";
  const sizes = { sm: "text-xs px-3 py-2", md: "text-sm px-4 py-2.5", lg: "text-base px-5 py-3" };
  const styles = variant === "solid" ? "text-white shadow-lg" : variant === "outline" ? "border" : "";
  const bg = variant === "solid" ? { background: "linear-gradient(135deg, var(--primary), var(--accent))" } : variant === "outline" ? { borderColor: "var(--border)", color: "var(--text)" } : { background: "var(--bg-soft)", color: "var(--text)" };
  return (
    <button type={type} disabled={disabled} onClick={ripple(onClick)} className={`${base} ${sizes[size]} ${styles} ${className}`} style={bg}>
      {Icon && <Icon size={size === "sm" ? 14 : 16} />} {children}
    </button>
  );
}
function Modal({ open, onClose, title, children, wide }) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4" style={{ background: "rgba(2,6,23,0.7)", backdropFilter: "blur(6px)" }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} className={`w-full ${wide ? "max-w-2xl" : "max-w-md"} overflow-y-auto rounded-2xl p-6 scale-in`} style={{ background: "var(--card)", border: "1px solid var(--border)", maxHeight: "85vh" }}>
        <div className="mb-4 flex items-center justify-between">
          <h3 className="text-base font-bold" style={{ color: "var(--text)" }}>{title}</h3>
          <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-[var(--bg-soft)]" style={{ color: "var(--text-mute)" }}><X size={18} /></button>
        </div>
        {children}
      </div>
    </div>
  );
}

/* ====== Auth Screen ====== */
function AuthScreen({ t, lang, onLogin, onClose }) {
  const [mode, setMode] = useState("login");
  const [name, setName] = useState(""); const [email, setEmail] = useState("");
  const [pw, setPw] = useState(""); const [confirm, setConfirm] = useState("");
  const [error, setError] = useState(""); const [loading, setLoading] = useState(false);
  const [forgotStep, setForgotStep] = useState(1);
  const [genCode, setGenCode] = useState("");
  const [enteredCode, setEnteredCode] = useState("");
  const [newPw, setNewPw] = useState(""); const [newConfirm, setNewConfirm] = useState("");
  const [info, setInfo] = useState("");

  const resetForgotState = () => {
    setForgotStep(1); setGenCode(""); setEnteredCode(""); setNewPw(""); setNewConfirm(""); setInfo("");
  };

  const submit = (e) => {
    e.preventDefault(); setError("");
    if (mode === "signup" && !name.trim()) return setError(t.auth_name_req);
    if (!email.trim()) return setError(t.auth_email_req);
    if (!isValidEmail(email)) return setError(t.auth_email_invalid);
    if (!pw) return setError(t.auth_pw_req);
    if (pw.length < 6) return setError(t.auth_pw_short);
    if (mode === "signup" && pw !== confirm) return setError(t.auth_pw_mismatch);
    setLoading(true);
    setTimeout(() => {
      const users = loadUsers();
      if (mode === "signup") {
        if (users[email.toLowerCase()]) { setLoading(false); return setError(t.auth_email_exists); }
        users[email.toLowerCase()] = { name: name.trim(), email: email.toLowerCase(), pwHash: hashPw(pw) };
        saveUsers(users); saveSession(email.toLowerCase());
        setLoading(false); onLogin({ name: name.trim(), email: email.toLowerCase() });
      } else {
        const u = users[email.toLowerCase()];
        if (!u || u.pwHash !== hashPw(pw)) { setLoading(false); return setError(t.auth_wrong); }
        saveSession(email.toLowerCase()); setLoading(false); onLogin({ name: u.name, email: u.email });
      }
    }, 400);
  };

  const submitForgotEmail = (e) => {
    e.preventDefault(); setError("");
    if (!email.trim()) return setError(t.auth_email_req);
    if (!isValidEmail(email)) return setError(t.auth_email_invalid);
    setLoading(true);
    setTimeout(() => {
      const users = loadUsers();
      const u = users[email.toLowerCase()];
      if (!u) { setLoading(false); return setError(t.auth_no_account); }
      const code = String(Math.floor(100000 + Math.random() * 900000));
      setGenCode(code);
      setLoading(false);
      setForgotStep(2);
    }, 400);
  };

  const submitForgotCode = (e) => {
    e.preventDefault(); setError("");
    if (!enteredCode.trim()) return setError(t.auth_enter_code);
    if (enteredCode.trim() !== genCode) return setError(t.auth_code_wrong);
    setForgotStep(3);
  };

  const submitNewPw = (e) => {
    e.preventDefault(); setError("");
    if (!newPw) return setError(t.auth_pw_req);
    if (newPw.length < 6) return setError(t.auth_pw_short);
    if (newPw !== newConfirm) return setError(t.auth_pw_mismatch);
    setLoading(true);
    setTimeout(() => {
      const users = loadUsers();
      const key = email.toLowerCase();
      if (!users[key]) { setLoading(false); return setError(t.auth_no_account); }
      users[key] = { ...users[key], pwHash: hashPw(newPw) };
      saveUsers(users);
      setLoading(false);
      setInfo(t.auth_reset_success);
      setForgotStep(4);
    }, 400);
  };

  const inpStyle = { background: "var(--bg-soft)", border: "1px solid var(--border)", color: "var(--text)" };
  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4" style={{ background: "rgba(2,6,23,0.85)", backdropFilter: "blur(8px)" }} dir={lang === "ar" ? "rtl" : "ltr"}>
      <div className="w-full max-w-md scale-in" style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 20 }}>
        <div className="p-7 sm:p-8">
          <div className="mb-6 text-center">
            <div className="mx-auto mb-3 flex h-14 w-14 items-center justify-center rounded-2xl text-2xl font-bold text-white shadow-lg" style={{ background: "linear-gradient(135deg, var(--primary), var(--accent))" }}>ن</div>
            <h2 className="text-xl font-bold" style={{ color: "var(--text)" }}>{mode === "forgot" ? t.auth_forgot_title : t.auth_welcome}</h2>
            <p className="mt-1 text-xs" style={{ color: "var(--text-mute)" }}>{mode === "forgot" ? t.auth_forgot_sub : t.auth_sub}</p>
          </div>

          {mode !== "forgot" && (
            <div className="mb-5 flex gap-1 rounded-xl p-1" style={{ background: "var(--bg-soft)" }}>
              <button type="button" onClick={() => { setMode("login"); setError(""); }} className={`flex-1 rounded-lg px-3 py-2 text-sm font-semibold transition ${mode === "login" ? "text-white" : ""}`} style={mode === "login" ? { background: "var(--primary)" } : { color: "var(--text-soft)" }}>{t.auth_login}</button>
              <button type="button" onClick={() => { setMode("signup"); setError(""); }} className={`flex-1 rounded-lg px-3 py-2 text-sm font-semibold transition ${mode === "signup" ? "text-white" : ""}`} style={mode === "signup" ? { background: "var(--primary)" } : { color: "var(--text-soft)" }}>{t.auth_signup}</button>
            </div>
          )}

          {mode === "login" || mode === "signup" ? (
            <>
              <form onSubmit={submit} className="space-y-3">
                {mode === "signup" && (
                  <label className="block">
                    <span className="mb-1 block text-xs font-medium" style={{ color: "var(--text-soft)" }}>{t.auth_name}</span>
                    <input className="w-full rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2" style={inpStyle} value={name} onChange={(e) => setName(e.target.value)} placeholder={t.auth_name} />
                  </label>
                )}
                <label className="block">
                  <span className="mb-1 block text-xs font-medium" style={{ color: "var(--text-soft)" }}>{t.auth_email}</span>
                  <input type="email" dir="ltr" className="w-full rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2" style={inpStyle} value={email} onChange={(e) => setEmail(e.target.value)} placeholder="you@example.com" />
                </label>
                <label className="block">
                  <span className="mb-1 flex items-center justify-between text-xs font-medium" style={{ color: "var(--text-soft)" }}>
                    <span>{t.auth_password}</span>
                    {mode === "login" && (
                      <button type="button" onClick={() => { setMode("forgot"); setError(""); resetForgotState(); }} className="font-semibold" style={{ color: "var(--primary)" }}>{t.auth_forgot}</button>
                    )}
                  </span>
                  <input type="password" dir="ltr" className="w-full rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2" style={inpStyle} value={pw} onChange={(e) => setPw(e.target.value)} placeholder="••••••••" />
                </label>
                {mode === "signup" && (
                  <label className="block">
                    <span className="mb-1 block text-xs font-medium" style={{ color: "var(--text-soft)" }}>{t.auth_confirm}</span>
                    <input type="password" dir="ltr" className="w-full rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2" style={inpStyle} value={confirm} onChange={(e) => setConfirm(e.target.value)} placeholder="••••••••" />
                  </label>
                )}
                {error && <div className="rounded-lg border border-rose-500/30 bg-rose-500/10 px-3 py-2 text-xs text-rose-400">{error}</div>}
                <button type="submit" disabled={loading} className="ripple-btn w-full rounded-xl px-4 py-3 text-sm font-bold text-white shadow-lg transition disabled:opacity-60" style={{ background: "linear-gradient(135deg, var(--primary), var(--accent))" }}>
                  {loading ? "…" : (mode === "login" ? t.auth_login_btn : t.auth_signup_btn)}
                </button>
              </form>
              <div className="mt-4 text-center text-xs" style={{ color: "var(--text-mute)" }}>
                {mode === "login" ? t.auth_no + " " : t.auth_have + " "}
                <button type="button" onClick={() => { setMode(mode === "login" ? "signup" : "login"); setError(""); }} className="font-semibold" style={{ color: "var(--primary)" }}>{mode === "login" ? t.auth_signup_here : t.auth_login_here}</button>
              </div>
            </>
          ) : (
            <>
              {forgotStep === 1 && (
                <form onSubmit={submitForgotEmail} className="space-y-3">
                  <label className="block">
                    <span className="mb-1 block text-xs font-medium" style={{ color: "var(--text-soft)" }}>{t.auth_email}</span>
                    <input type="email" dir="ltr" className="w-full rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2" style={inpStyle} value={email} onChange={(e) => setEmail(e.target.value)} placeholder="you@example.com" />
                  </label>
                  {error && <div className="rounded-lg border border-rose-500/30 bg-rose-500/10 px-3 py-2 text-xs text-rose-400">{error}</div>}
                  <button type="submit" disabled={loading} className="ripple-btn w-full rounded-xl px-4 py-3 text-sm font-bold text-white shadow-lg transition disabled:opacity-60" style={{ background: "linear-gradient(135deg, var(--primary), var(--accent))" }}>
                    {loading ? "…" : t.auth_send_code}
                  </button>
                </form>
              )}
              {forgotStep === 2 && (
                <form onSubmit={submitForgotCode} className="space-y-3">
                  <div className="rounded-lg border px-3 py-2 text-xs" style={{ borderColor: "var(--border)", background: "var(--bg-soft)", color: "var(--text-soft)" }}>
                    {t.auth_code_sent} <span className="font-mono text-base font-bold" style={{ color: "var(--primary)" }} dir="ltr">{genCode}</span>
                  </div>
                  <label className="block">
                    <span className="mb-1 block text-xs font-medium" style={{ color: "var(--text-soft)" }}>{t.auth_enter_code}</span>
                    <input type="text" dir="ltr" inputMode="numeric" className="w-full rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2" style={inpStyle} value={enteredCode} onChange={(e) => setEnteredCode(e.target.value)} placeholder="000000" />
                  </label>
                  {error && <div className="rounded-lg border border-rose-500/30 bg-rose-500/10 px-3 py-2 text-xs text-rose-400">{error}</div>}
                  <button type="submit" className="ripple-btn w-full rounded-xl px-4 py-3 text-sm font-bold text-white shadow-lg transition" style={{ background: "linear-gradient(135deg, var(--primary), var(--accent))" }}>
                    {t.auth_verify_code_btn}
                  </button>
                </form>
              )}
              {forgotStep === 3 && (
                <form onSubmit={submitNewPw} className="space-y-3">
                  <label className="block">
                    <span className="mb-1 block text-xs font-medium" style={{ color: "var(--text-soft)" }}>{t.auth_new_pw}</span>
                    <input type="password" dir="ltr" className="w-full rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2" style={inpStyle} value={newPw} onChange={(e) => setNewPw(e.target.value)} placeholder="••••••••" />
                  </label>
                  <label className="block">
                    <span className="mb-1 block text-xs font-medium" style={{ color: "var(--text-soft)" }}>{t.auth_confirm_new_pw}</span>
                    <input type="password" dir="ltr" className="w-full rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2" style={inpStyle} value={newConfirm} onChange={(e) => setNewConfirm(e.target.value)} placeholder="••••••••" />
                  </label>
                  {error && <div className="rounded-lg border border-rose-500/30 bg-rose-500/10 px-3 py-2 text-xs text-rose-400">{error}</div>}

/* ====== Animated Counter ====== */
function AnimatedCounter({ target, suffix = "", duration = 1800 }) {
  const [count, setCount] = useState(0);
  const [started, setStarted] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting && !started) { setStarted(true); obs.disconnect(); }
    }, { threshold: 0.5 });
    obs.observe(el);
    return () => obs.disconnect();
  }, [started]);
  useEffect(() => {
    if (!started) return;
    const steps = 60;
    const inc = target / steps;
    let cur = 0;
    const timer = setInterval(() => {
      cur += inc;
      if (cur >= target) { setCount(target); clearInterval(timer); }
      else setCount(Math.floor(cur));
    }, duration / steps);
    return () => clearInterval(timer);
  }, [started, target, duration]);
  return <span ref={ref}>{count.toLocaleString()}{suffix}</span>;
}

function getChatReply(msg, lang) {
  const lower = msg.toLowerCase();
  const kb = CHAT_KB[lang] || CHAT_KB.en;
  for (const entry of kb) {
    if (entry.kws.some((k) => lower.includes(k.toLowerCase()))) return entry.reply;
  }
  return lang === "ar"
    ? "شكرًا على سؤالك! ده عرض تجريبي بردود محدودة مسبقًا (وليس ذكاء اصطناعي حقيقي متصل بالإنترنت). جرب تسأل عن: المميزات، الأسعار، الأمان، أو التجربة المجانية."
    : "Thanks for your question! This is a demo with pre-set responses (not a real connected AI). Try asking about: features, pricing, security, or the free trial.";
}

const NEXUS_AI_KEY_STORAGE = "nexus-ai-key-session";
async function callClaudeAPI(apiKey, history, lang) {
  const systemPrompt = lang === "ar"
    ? "أنت المساعد الذكي لمنصة نِكسوس، منصة إدارة أعمال متكاملة (CRM، محاسبة، مخزون، موارد بشرية، وأكثر). رد بالعربية بشكل ودود ومختصر ومفيد."
    : "You are the AI assistant for Nexus, an all-in-one business platform (CRM, accounting, inventory, HR, and more). Reply in English, friendly, concise, and helpful.";
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-5",
      max_tokens: 500,
      system: systemPrompt,
      messages: history.map((m) => ({ role: m.role === "assistant" ? "assistant" : "user", content: m.content }))
    })
  });
  if (!res.ok) {
    const errBody = await res.json().catch(() => null);
    const errType = errBody && errBody.error && errBody.error.type;
    throw new Error(errType || `http_${res.status}`);
  }
  const data = await res.json();
  const textBlock = (data.content || []).find((b) => b.type === "text");
  return textBlock ? textBlock.text : "";
}

function ChatWidget({ t, lang }) {
  const [open, setOpen] = useState(false);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [messages, setMessages] = useState([{ role: "assistant", content: t.chat_welcome }]);
  const [apiKey, setApiKey] = useState(() => { try { return sessionStorage.getItem(NEXUS_AI_KEY_STORAGE) || ""; } catch (e) { return ""; } });
  const [showSettings, setShowSettings] = useState(false);
  const [keyInput, setKeyInput] = useState("");
  const scrollRef = useRef(null);
  const inputRef = useRef(null);
  useEffect(() => { setMessages([{ role: "assistant", content: t.chat_welcome }]); }, [lang, t.chat_welcome]);
  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [messages, loading]);
  useEffect(() => { if (open) setTimeout(() => inputRef.current?.focus(), 250); }, [open]);

  const saveKey = () => {
    const k = keyInput.trim();
    if (!k) return;
    try { sessionStorage.setItem(NEXUS_AI_KEY_STORAGE, k); } catch (e) {}
    setApiKey(k); setKeyInput(""); setShowSettings(false);
  };
  const clearKey = () => {
    try { sessionStorage.removeItem(NEXUS_AI_KEY_STORAGE); } catch (e) {}
    setApiKey(""); setShowSettings(false);
  };

  const send = (text) => {
    const content = (text ?? input).trim(); if (!content || loading) return;
    const next = [...messages, { role: "user", content }]; setMessages(next); setInput(""); setLoading(true);

    if (apiKey) {
      callClaudeAPI(apiKey, next, lang)
        .then((reply) => { setMessages([...next, { role: "assistant", content: reply || "…" }]); setLoading(false); })
        .catch((err) => {
          const msg = String(err.message || "");
          const friendly = msg.includes("authentication") ? t.chat_key_invalid : t.chat_key_error;
          setMessages([...next, { role: "assistant", content: friendly + " " + getChatReply(content, lang) }]);
          setLoading(false);
        });
    } else {
      setTimeout(() => {
        const reply = getChatReply(content, lang);
        setMessages([...next, { role: "assistant", content: reply }]); setLoading(false);
      }, 900);
    }
  };
  return (
    <>
      {!open && (
        <button onClick={() => setOpen(true)} className="fixed bottom-5 end-5 z-50 w-14 h-14 rounded-full text-white shadow-2xl flex items-center justify-center pulse-glow transition hover:scale-105" style={{ background: "linear-gradient(135deg, var(--primary), var(--accent))" }} aria-label="chat">
          <MessageCircle size={22} />
          <span className="absolute -top-1 -end-1 w-4 h-4 bg-emerald-500 rounded-full" style={{ border: "2px solid var(--bg)" }} />
        </button>
      )}
      {open && (
        <div className="fixed bottom-5 end-5 z-50 w-[calc(100vw-2.5rem)] sm:w-[400px] h-[80vh] sm:h-[600px] max-h-[640px] rounded-2xl shadow-2xl flex flex-col animate-slide-up" style={{ background: "var(--card)", border: "1px solid var(--border)" }} dir={lang === "ar" ? "rtl" : "ltr"}>
          <div className="flex items-center justify-between gap-3 px-4 py-3.5 border-b" style={{ borderColor: "var(--border)" }}>
            <div className="flex items-center gap-2.5 min-w-0">
              <div className="relative shrink-0">
                <div className="w-9 h-9 rounded-full flex items-center justify-center" style={{ background: "linear-gradient(135deg, var(--primary), var(--accent))" }}>
                  <Sparkles size={16} className="text-white" />
                </div>
                <div className="absolute -bottom-0.5 -end-0.5 w-3 h-3 rounded-full" style={{ background: apiKey ? "#10b981" : "#94a3b8", border: "2px solid var(--card)" }} />
              </div>
              <div className="min-w-0">
                <h3 className="font-bold text-sm truncate" style={{ color: "var(--text)" }}>{t.chat_title}</h3>
                <p className="text-[10px] truncate" style={{ color: apiKey ? "#10b981" : "var(--text-mute)" }}>{apiKey ? t.chat_ai_live : t.chat_ai_demo}</p>
              </div>
            </div>
            <div className="flex items-center gap-1 shrink-0">
              <button onClick={() => { setShowSettings((s) => !s); setKeyInput(""); }} className="p-2 rounded-lg hover:bg-[var(--bg-soft)]" style={{ color: "var(--text-mute)" }} aria-label="settings"><Settings size={15} /></button>
              <button onClick={() => setOpen(false)} className="p-2 rounded-lg hover:bg-[var(--bg-soft)]" style={{ color: "var(--text-mute)" }} aria-label="close"><X size={16} /></button>
            </div>
          </div>

          {showSettings ? (
            <div className="flex-1 overflow-y-auto p-4 space-y-3" style={{ background: "var(--bg-soft)" }}>
              <h4 className="text-sm font-bold" style={{ color: "var(--text)" }}>{t.chat_settings}</h4>
              <label className="block">
                <span className="mb-1 block text-xs font-medium" style={{ color: "var(--text-soft)" }}>{t.chat_key_label}</span>
                <input type="password" dir="ltr" value={keyInput} onChange={(e) => setKeyInput(e.target.value)} placeholder={t.chat_key_placeholder} className="w-full rounded-lg px-3 py-2.5 text-xs outline-none focus:ring-2" style={{ background: "var(--card)", border: "1px solid var(--border)", color: "var(--text)" }} />
              </label>
              <p className="text-[10px] leading-relaxed" style={{ color: "var(--text-mute)" }}>{t.chat_key_help}</p>
              <button onClick={saveKey} disabled={!keyInput.trim()} className="ripple-btn w-full rounded-xl px-4 py-2.5 text-xs font-bold text-white shadow-lg transition disabled:opacity-60" style={{ background: "linear-gradient(135deg, var(--primary), var(--accent))" }}>{t.chat_key_save}</button>
              {apiKey && (
                <button onClick={clearKey} className="w-full rounded-xl px-4 py-2.5 text-xs font-semibold transition" style={{ border: "1px solid var(--border)", color: "var(--text-soft)" }}>{t.chat_key_clear}</button>
              )}
            </div>
          ) : (
          <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-3" style={{ background: "var(--bg-soft)" }}>
            {messages.map((m, i) => (
              <div key={i} className={`flex gap-2 max-w-[88%] ${m.role === "user" ? "ms-auto justify-end" : ""}`}>
                {m.role === "assistant" && <div className="w-7 h-7 shrink-0 rounded-full flex items-center justify-center" style={{ background: "linear-gradient(135deg, var(--primary), var(--accent))" }}><Sparkles size={14} className="text-white" /></div>}
                <div className={`rounded-2xl px-3.5 py-2.5 text-xs leading-relaxed whitespace-pre-wrap ${m.role === "user" ? "text-white" : ""}`} style={m.role === "user" ? { background: "var(--primary)" } : { background: "var(--card)", border: "1px solid var(--border)", color: "var(--text)" }}>{m.content}</div>
                {m.role === "user" && <div className="w-7 h-7 shrink-0 rounded-full flex items-center justify-center text-[10px] font-bold" style={{ background: "var(--card-soft)", color: "var(--text-soft)" }}>{lang === "ar" ? "أ" : "U"}</div>}
              </div>
            ))}
            {loading && (
              <div className="flex gap-2">
                <div className="w-7 h-7 shrink-0 rounded-full flex items-center justify-center" style={{ background: "linear-gradient(135deg, var(--primary), var(--accent))" }}><Sparkles size={14} className="text-white" /></div>
                <div className="rounded-2xl px-4 py-3 flex items-center gap-1" style={{ background: "var(--card)", border: "1px solid var(--border)" }}>
                  <span className="typing-dot" /><span className="typing-dot" /><span className="typing-dot" />
                </div>
              </div>
            )}
            {messages.length === 1 && !loading && (
              <div className="pt-2 space-y-1.5">
                <p className="text-[10px] px-1" style={{ color: "var(--text-mute)" }}>{lang === "ar" ? "اقتراحات:" : "Suggestions:"}</p>
                {[t.chat_s1, t.chat_s2, t.chat_s3].map((s, i) => (
                  <button key={i} onClick={() => send(s)} className="block w-full text-start text-xs px-3 py-2 rounded-lg border transition hover:bg-[var(--bg-soft)]" style={{ background: "var(--card)", borderColor: "var(--border)", color: "var(--text)" }}>{s}</button>
                ))}
              </div>
            )}
          </div>
          )}

          {!showSettings && (
          <div className="p-3 border-t" style={{ borderColor: "var(--border)" }}>
            <form onSubmit={(e) => { e.preventDefault(); send(); }} className="flex items-center gap-2">
              <input ref={inputRef} type="text" value={input} onChange={(e) => setInput(e.target.value)} placeholder={t.chat_ph} disabled={loading} className="flex-1 rounded-full px-4 py-2.5 text-xs outline-none focus:ring-2 disabled:opacity-60" style={{ background: "var(--bg-soft)", color: "var(--text)" }} />
              <button type="submit" disabled={loading || !input.trim()} className="w-9 h-9 rounded-full flex items-center justify-center text-white shrink-0 transition disabled:opacity-60" style={{ background: "var(--primary)" }}>
                <Send size={14} />
              </button>
            </form>
            <p className="text-[9px] text-center mt-2" style={{ color: "var(--text-mute)" }}>{t.chat_powered}</p>
          </div>
          )}
        </div>
      )}
    </>
  );
}

/* ====== App view (each module's working page) ====== */
function AppView({ kind, t, lang, user, onBack }) {
  const key = userStorageKey(user.email, kind);
  const [items, setItems] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [search, setSearch] = useState("");
  const [dragItem, setDragItem] = useState(null);

  useEffect(() => {
    try { const raw = localStorage.getItem(key); if (raw) { setItems(JSON.parse(raw)); return; } } catch (e) {}
    const seed = seedAppData(kind, lang);
    setItems(seed); try { localStorage.setItem(key, JSON.stringify(seed)); } catch (e) {}
  }, [key, kind, lang]);

  useEffect(() => { if (items) { try { localStorage.setItem(key, JSON.stringify(items)); } catch (e) {} } }, [items, key]);

  const titleMap = {
    crm: t.crm_title, projects: t.projects_title, inventory: t.inventory_title, accounting: t.accounting_title,
    hr: t.hr_title, sales: t.sales_title, purchasing: t.purchasing_title, marketing: t.marketing_title,
    manufacturing: t.manufacturing_title, livechat: t.livechat_title, attendance: t.attendance_title,
    expenses: t.expenses_title, rentals: t.rentals_title, learning: t.learning_title, surveys: t.surveys_title,
    fieldservice: t.fieldservice_title, dashboards: t.dashboards_title, documents: t.documents_title,
    email: t.email_title, website: t.website_title,
  };
  const subMap = {
    crm: t.crm_sub, projects: t.projects_sub, inventory: t.inventory_sub, accounting: t.accounting_sub,
    hr: t.hr_sub, sales: t.sales_sub, purchasing: t.purchasing_sub, marketing: t.marketing_sub,
    manufacturing: t.manufacturing_sub, livechat: t.livechat_sub, attendance: t.attendance_sub,
    expenses: t.expenses_sub, rentals: t.rentals_sub, learning: t.learning_sub, surveys: t.surveys_sub,
    fieldservice: t.fieldservice_sub, dashboards: t.dashboards_sub, documents: t.documents_sub,
    email: t.email_sub, website: t.website_sub,
  };
  const title = titleMap[kind] || kind;
  const sub = subMap[kind] || "";

  const colsForKind = kind === "inventory"
    ? [["name",0],["qty",1],["price",2],["warehouse",3],["status",4]]
    : kind === "accounting"
    ? [["number",0],["client",1],["amount",2],["date",3],["status",4]]
    : kind === "hr"
    ? [["name",0],["role",1],["email",2],["status",3]]
    : kind === "manufacturing"
    ? [["number",0],["product",1],["qty",2],["status",3]]
    : [["name",0],["desc",1],["value",2],["status",3]];
  const colsLabelsSrc = kind === "inventory" ? t.inventory_cols : kind === "accounting" ? t.accounting_cols : kind === "hr" ? t.hr_cols : kind === "manufacturing" ? t.manufacturing_cols : t.generic_cols;
  const tableCols = colsForKind.map(([key], i) => ({ key, label: colsLabelsSrc[i] }));

  if (!items) return <div className="flex h-screen items-center justify-center" style={{ color: "var(--text-mute)" }}>…</div>;

  const filtered = items.filter((it) => !search || Object.values(it).some((v) => String(v).toLowerCase().includes(search.toLowerCase())));

  const saveItem = (data) => {
    if (editing) { setItems(items.map((it) => it.id === editing.id ? { ...it, ...data } : it)); }
    else { setItems([...items, { id: Date.now().toString(), ...data }]); }
    setShowForm(false); setEditing(null);
  };
  const deleteItem = (id) => { if (confirm(t.app_delete + "؟")) setItems(items.filter((it) => it.id !== id)); };

  return (
    <div className="min-h-screen" style={{ background: "var(--bg)" }} dir={lang === "ar" ? "rtl" : "ltr"}>
      {/* Top bar */}
      <div className="sticky top-0 z-30 backdrop-blur-xl border-b" style={{ background: "color-mix(in srgb, var(--bg) 85%, transparent)", borderColor: "var(--border)" }}>
        <div className="container mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between gap-3">
          <button onClick={onBack} className="inline-flex items-center gap-2 text-sm font-semibold" style={{ color: "var(--text-soft)" }}>
            {lang === "ar" ? <ArrowRight size={16} /> : <ArrowLeft size={16} />} {t.back_home}
          </button>
          <div className="flex items-center gap-2">
            <div className="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold text-white" style={{ background: "linear-gradient(135deg, var(--primary), var(--accent))" }}>{user.name.charAt(0).toUpperCase()}</div>
            <span className="hidden sm:inline text-xs font-semibold" style={{ color: "var(--text)" }}>{user.name}</span>
          </div>
        </div>
      </div>

      <div className="container mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-8">
        {/* Header */}
        <div className="mb-6 flex flex-wrap items-center justify-between gap-3 fade-up">
          <div>
            <h1 className="text-2xl sm:text-3xl font-bold" style={{ color: "var(--text)" }}>{title}</h1>
            <p className="text-sm mt-1" style={{ color: "var(--text-soft)" }}>{sub}</p>
          </div>
          <div className="flex gap-2">
            <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder={t.app_search} className="rounded-lg px-3 py-2 text-sm outline-none focus:ring-2" style={{ background: "var(--card)", border: "1px solid var(--border)", color: "var(--text)" }} />
            <Btn icon={Plus} onClick={() => { setEditing(null); setShowForm(true); }}>{t.app_new}</Btn>
          </div>
        </div>

        {/* Content - Kanban for projects/crm, table otherwise */}
        {(kind === "projects" || kind === "crm") && items.length > 0 ? (
          <KanbanBoard kind={kind} items={filtered} stages={kind === "projects" ? t.projects_stages : t.crm_stages} t={t} lang={lang} onMove={(id, stage) => setItems(items.map((it) => it.id === id ? { ...it, stage } : it))} onEdit={(it) => { setEditing(it); setShowForm(true); }} onDelete={deleteItem} />
        ) : items.length === 0 ? (
          <div className="rounded-2xl border border-dashed p-12 text-center" style={{ borderColor: "var(--border)" }}>
            <p className="text-sm" style={{ color: "var(--text-mute)" }}>{t.app_no_data}</p>
            <Btn icon={Plus} onClick={() => { setEditing(null); setShowForm(true); }} className="mt-4">{t.app_new}</Btn>
          </div>
        ) : (
          <div className="rounded-2xl overflow-hidden" style={{ background: "var(--card)", border: "1px solid var(--border)" }}>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead style={{ background: "var(--bg-soft)" }}>
                  <tr>
                    <th className="px-4 py-3 text-start font-semibold text-xs" style={{ color: "var(--text-soft)" }}>#</th>
                    {tableCols.map((c, i) => <th key={i} className="px-4 py-3 text-start font-semibold text-xs" style={{ color: "var(--text-soft)" }}>{c.label}</th>)}
                    <th className="px-4 py-3 text-start font-semibold text-xs" style={{ color: "var(--text-soft)" }}></th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map((it, idx) => (
                    <tr key={it.id} className="border-t" style={{ borderColor: "var(--border)" }}>
                      <td className="px-4 py-3 text-xs" style={{ color: "var(--text-mute)" }}>{idx+1}</td>
                      {tableCols.map((c, ci) => {
                        const raw = it[c.key];
                        const display = (raw === undefined || raw === null || raw === "") ? "—" : String(raw);
                        return (
                          <td key={ci} className={ci === 0 ? "px-4 py-3 font-medium" : "px-4 py-3"} style={{ color: ci === 0 ? "var(--text)" : "var(--text-soft)" }}>{display}</td>
                        );
                      })}
                      <td className="px-4 py-3">
                        <div className="flex gap-1">
                          <button onClick={() => { setEditing(it); setShowForm(true); }} className="p-1.5 rounded-lg hover:bg-[var(--bg-soft)]" style={{ color: "var(--text-soft)" }}><Edit size={14} /></button>
                          <button onClick={() => deleteItem(it.id)} className="p-1.5 rounded-lg hover:bg-rose-500/10 text-rose-400"><Trash size={14} /></button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>

      {showForm && <ItemForm kind={kind} t={t} lang={lang} editing={editing} onSave={saveItem} onClose={() => { setShowForm(false); setEditing(null); }} />}
    </div>
  );
}

/* ====== Kanban board ====== */
function KanbanBoard({ kind, items, stages, t, lang, onMove, onEdit, onDelete }) {
  const [dragOver, setDragOver] = useState(null);
  const [dragId, setDragId] = useState(null);
  const stageKey = kind === "projects" ? "stage" : "stage";
  return (
    <div className="flex gap-3 overflow-x-auto pb-2">
      {stages.map((stage, si) => {
        const colItems = items.filter((it) => Number(it[stageKey]) === si);
        return (
          <div key={si}
            onDragOver={(e) => { e.preventDefault(); setDragOver(si); }}
            onDragLeave={() => setDragOver(null)}
            onDrop={(e) => { e.preventDefault(); if (dragId) { onMove(dragId, si); setDragId(null); } setDragOver(null); }}
            className="flex w-72 shrink-0 flex-col rounded-2xl p-3" style={{ background: dragOver === si ? "color-mix(in srgb, var(--primary) 8%, var(--bg-soft))" : "var(--bg-soft)", border: dragOver === si ? "1px solid var(--primary)" : "1px solid var(--border)" }}>
            <div className="mb-3 flex items-center justify-between px-1">
              <span className="text-sm font-bold" style={{ color: "var(--text)" }}>{stage}</span>
              <span className="text-xs px-2 py-0.5 rounded-full" style={{ background: "var(--card)", color: "var(--text-soft)" }}>{colItems.length}</span>
            </div>
            <div className="flex flex-col gap-2" style={{ minHeight: 60 }}>
              {colItems.map((it) => (
                <div key={it.id} draggable onDragStart={() => setDragId(it.id)} onClick={() => onEdit(it)} className="cursor-pointer rounded-xl p-3 transition hover:shadow-md" style={{ background: "var(--card)", border: "1px solid var(--border)" }}>
                  <div className="flex items-start justify-between gap-2 mb-1">
                    <span className="text-sm font-medium" style={{ color: "var(--text)" }}>{it.name || it.title}</span>
                    {it.priority && <span className="text-[10px] px-1.5 py-0.5 rounded" style={{ background: it.priority === "urgent" ? "rgba(244,63,94,0.15)" : it.priority === "high" ? "rgba(245,158,11,0.15)" : "rgba(100,116,139,0.15)", color: it.priority === "urgent" ? "#fb7185" : it.priority === "high" ? "#f59e0b" : "#94a3b8" }}>{it.priority}</span>}
                  </div>
                  {it.company && <p className="text-xs" style={{ color: "var(--text-mute)" }}>{it.company}</p>}
                  {it.due && <p className="text-xs mt-1 flex items-center gap-1" style={{ color: "var(--text-mute)" }}><Calendar size={11} /> {it.due}</p>}
                  {it.value && <p className="text-xs mt-1 font-semibold" style={{ color: "var(--primary)" }}>{it.value} {lang === "ar" ? "ر.س" : "SAR"}</p>}
                  <div className="flex items-center justify-between mt-2">
                    {it.assignee && <span className="text-[10px] px-2 py-0.5 rounded-full" style={{ background: "var(--bg-soft)", color: "var(--text-soft)" }}>{it.assignee}</span>}
                    <button onClick={(e) => { e.stopPropagation(); onDelete(it.id); }} className="text-[10px] p-1 rounded text-rose-400 hover:bg-rose-500/10"><Trash size={11} /></button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ====== Item form modal ====== */
function ItemForm({ kind, t, lang, editing, onSave, onClose }) {
  const [data, setData] = useState(editing || {});
  const fields = kind === "crm" ? [
    { key: "name", label: t.app_name }, { key: "email", label: t.app_email }, { key: "phone", label: t.app_phone },
    { key: "company", label: t.app_company }, { key: "value", label: t.app_value }, { key: "stage", label: t.app_status, type: "select-stage" }
  ] : kind === "projects" ? [
    { key: "title", label: t.app_name }, { key: "assignee", label: lang === "ar" ? "المسؤول" : "Assignee" },
    { key: "due", label: lang === "ar" ? "الاستحقاق" : "Due", type: "date" },
    { key: "priority", label: lang === "ar" ? "الأولوية" : "Priority", type: "select-priority" },
    { key: "stage", label: t.app_status, type: "select-stage" }
  ] : kind === "inventory" ? [
    { key: "name", label: lang === "ar" ? "المنتج" : "Product" }, { key: "qty", label: lang === "ar" ? "الكمية" : "Quantity", type: "number" },
    { key: "price", label: lang === "ar" ? "السعر" : "Price", type: "number" }, { key: "warehouse", label: lang === "ar" ? "المستودع" : "Warehouse" },
    { key: "status", label: t.app_status, type: "select-invstatus" }
  ] : kind === "accounting" ? [
    { key: "number", label: lang === "ar" ? "رقم الفاتورة" : "Invoice #" }, { key: "client", label: lang === "ar" ? "العميل" : "Client" },
    { key: "amount", label: t.app_value, type: "number" }, { key: "date", label: lang === "ar" ? "التاريخ" : "Date", type: "date" },
    { key: "status", label: t.app_status, type: "select-invstatus2" }
  ] : kind === "hr" ? [
    { key: "name", label: t.app_name }, { key: "role", label: lang === "ar" ? "الوظيفة" : "Role" },
    { key: "email", label: t.app_email }, { key: "status", label: t.app_status, type: "select-hrstatus" }
  ] : kind === "manufacturing" ? [
    { key: "number", label: lang === "ar" ? "أمر الإنتاج" : "Order #" }, { key: "product", label: lang === "ar" ? "المنتج" : "Product" },
    { key: "qty", label: lang === "ar" ? "الكمية" : "Quantity", type: "number" }, { key: "status", label: t.app_status, type: "select-genstatus" }
  ] : [
    { key: "name", label: t.app_name }, { key: "desc", label: lang === "ar" ? "الوصف" : "Description" },
    { key: "value", label: t.app_value }, { key: "status", label: t.app_status, type: "select-genstatus" }
  ];

  const setField = (k, v) => setData({ ...data, [k]: v });
  const inpStyle = { background: "var(--bg-soft)", border: "1px solid var(--border)", color: "var(--text)" };

  const stageOptions = kind === "projects" ? t.projects_stages : t.crm_stages;
  const priorityOptions = lang === "ar" ? ["low:منخفضة", "medium:متوسطة", "high:عالية", "urgent:عاجلة"] : ["low:Low", "medium:Medium", "high:High", "urgent:Urgent"];
  const invStatus = lang === "ar" ? ["in:متوفر", "low:منخفض", "out:نفد"] : ["in:In stock", "low:Low", "out:Out"];
  const invStatus2 = lang === "ar" ? ["draft:مسودة", "sent:مرسلة", "paid:مدفوعة"] : ["draft:Draft", "sent:Sent", "paid:Paid"];
  const hrStatus = lang === "ar" ? ["active:نشط", "leave:إجازة", "inactive:غير نشط"] : ["active:Active", "leave:On leave", "inactive:Inactive"];
  const genStatus = lang === "ar" ? ["active:نشط", "pending:معلق", "done:منجز"] : ["active:Active", "pending:Pending", "done:Done"];

  return (
    <Modal open onClose={onClose} title={editing ? t.app_edit : t.app_new} wide>
      <div className="grid sm:grid-cols-2 gap-3">
        {fields.map((f, i) => (
          <label key={i} className="block">
            <span className="mb-1 block text-xs font-medium" style={{ color: "var(--text-soft)" }}>{f.label}</span>
            {f.type === "select-stage" ? (
              <select value={data[f.key] ?? 0} onChange={(e) => setField(f.key, Number(e.target.value))} className="w-full rounded-lg px-3 py-2 text-sm outline-none" style={inpStyle}>
                {stageOptions.map((s, si) => <option key={si} value={si}>{s}</option>)}
              </select>
            ) : f.type === "select-priority" ? (
              <select value={data[f.key] || "medium"} onChange={(e) => setField(f.key, e.target.value)} className="w-full rounded-lg px-3 py-2 text-sm outline-none" style={inpStyle}>
                {priorityOptions.map((p) => { const [v, l] = p.split(":"); return <option key={v} value={v}>{l}</option>; })}
              </select>
            ) : f.type && f.type.startsWith("select-") ? (
              <select value={data[f.key] || ""} onChange={(e) => setField(f.key, e.target.value)} className="w-full rounded-lg px-3 py-2 text-sm outline-none" style={inpStyle}>
                {(f.type === "select-invstatus" ? invStatus : f.type === "select-invstatus2" ? invStatus2 : f.type === "select-hrstatus" ? hrStatus : genStatus).map((p) => { const [v, l] = p.split(":"); return <option key={v} value={v}>{l}</option>; })}
              </select>
            ) : (
              <input type={f.type || "text"} value={data[f.key] || ""} onChange={(e) => setField(f.key, f.type === "number" ? Number(e.target.value) : e.target.value)} className="w-full rounded-lg px-3 py-2 text-sm outline-none focus:ring-2" style={inpStyle} />
            )}
          </label>
        ))}
      </div>
      <div className="mt-5 flex justify-end gap-2">
        <Btn variant="outline" onClick={onClose}>{t.app_cancel}</Btn>
        <Btn onClick={() => { if (data.name || data.title || data.number) { onSave(data); } }}>{t.app_save}</Btn>
      </div>
    </Modal>
  );
}

/* ====== App root ====== */
function App() {
  const [lang, setLang] = useState(detectInitialLang);
  const [theme, setTheme] = useState(detectInitialTheme);
  const [user, setUser] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [showAuth, setShowAuth] = useState(false);
  const [authMode, setAuthMode] = useState("login");
  const [openApp, setOpenApp] = useState(null); // null = landing, string = app kind

  useEffect(() => {
    try {
      const root = document.documentElement;
      if (theme === "dark") root.classList.add("dark"); else root.classList.remove("dark");
      const dir = lang === "ar" ? "rtl" : "ltr";
      root.setAttribute("dir", dir); root.setAttribute("lang", lang);
    } catch (e) {}
  }, [theme, lang]);

  useEffect(() => {
    const s = loadSession();
    if (s) { const u = loadUsers()[s]; if (u) setUser({ name: u.name, email: u.email }); else saveSession(null); }
    setAuthChecked(true);
  }, []);

  const handleLogin = useCallback((u) => { setUser(u); setShowAuth(false); }, []);
  const handleLogout = useCallback(() => { saveSession(null); setUser(null); setOpenApp(null); }, []);
  const onNav = useCallback((href) => { setOpenApp(null); setTimeout(() => { const el = document.querySelector(href); if (el) el.scrollIntoView({ behavior: "smooth" }); }, 50); }, []);
  const onOpenApp = useCallback((kind) => {
    if (!user) { setAuthMode("login"); setShowAuth(true); return; }
    setOpenApp(kind);
    window.scrollTo({ top: 0 });
  }, [user]);

  if (!authChecked) return <div className="flex h-screen items-center justify-center" style={{ background: "var(--bg)", color: "var(--text-mute)" }}>…</div>;

  const t = STR[lang];

  // If an app is open and user logged in, show app view
  if (openApp && user) {
    return (
      <div>
        <AppView kind={openApp} t={t} lang={lang} user={user} onBack={() => setOpenApp(null)} />
        <ChatWidget t={t} lang={lang} />
      </div>
    );
  }

  return (
    <div>
      <Header t={t} lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} onLogin={() => { setAuthMode("login"); setShowAuth(true); }} user={user} onLogout={handleLogout} onNav={onNav} />
      <Hero t={t} lang={lang} onNav={onNav} />
      <Trusted t={t} />
      <Modules t={t} onOpenApp={onOpenApp} />
      <DashboardPreview t={t} lang={lang} />
      <AISection t={t} lang={lang} onTryChat={() => { const el = document.getElementById("ai"); if (el) el.scrollIntoView({ behavior: "smooth" }); }} />
      <Pricing t={t} onSignup={() => { setAuthMode("signup"); setShowAuth(true); }} />
      <Testimonials t={t} />
      <FAQ t={t} />
      <CTA t={t} onNav={onNav} />
      <Footer t={t} onNav={onNav} />
      <ChatWidget t={t} lang={lang} />
      {showAuth && <AuthScreen t={t} lang={lang} onLogin={handleLogin} onClose={() => setShowAuth(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
(function () {
  function showBootError(msg) {
    var el = document.getElementById("boot-loading");
    if (!el) return;
    el.innerHTML = '<div style="max-width:520px;text-align:center"><div style="color:#fb7185;font-weight:700;font-size:15px;margin-bottom:10px">⚠️ مشكلة في تشغيل الصفحة</div><div style="font-size:12px;color:#94a3b8;word-break:break-word;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 14px;margin-bottom:12px;direction:ltr;text-align:left;font-family:monospace">' + String(msg).replace(/</g, "&lt;") + '</div><div style="font-size:13px;color:#cbd5e1;line-height:1.7">تأكد من اتصالك بالإنترنت وحاول مرة أخرى.</div></div>';
  }
  window.addEventListener("error", function (e) { showBootError((e && e.message) || "حدث خطأ"); });
  window.addEventListener("unhandledrejection", function (e) { showBootError((e && e.reason && e.reason.message) || "حدث خطأ غير متوقع"); });
  var watchdog = setTimeout(function () {
    var el = document.getElementById("boot-loading");
    if (el && document.body.contains(el)) showBootError("الصفحة لم تُحمّل بعد ١٠ ثواني. تأكد من اتصالك بالإنترنت.");
  }, 10000);
  try {
    if (typeof Babel === "undefined") throw new Error("Babel لم يتم تحميله");
    if (typeof React === "undefined" || typeof ReactDOM === "undefined") throw new Error("React لم يتم تحميله");
    var srcEl = document.getElementById("app-source");
    var code = srcEl.textContent;
    var out = Babel.transform(code, { presets: [["react", { runtime: "classic" }]] }).code;
    clearTimeout(watchdog);
    var s = document.createElement("script");
    s.textContent = out;
    document.body.appendChild(s);
  } catch (err) {
    clearTimeout(watchdog);
    showBootError(err && err.message ? err.message : String(err));
  }
})();
</script>
</body>
